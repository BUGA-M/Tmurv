name: 'Publish Release'

on:
  push:
    tags:
      - 'v*' # Se déclenche quand vous poussez un tag comme v1.0.0, v0.2.0, etc.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Pour macOS (Intel & Apple Silicon)
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04' # Pour Linux (AppImage & Deb)
            args: ''
          - platform: 'windows-latest' # Pour Windows (MSI & NSIS)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Les cibles nécessaires pour compiler pour macOS Intel + ARM
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: Prepare signing key
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          python3 -c "
          import os, base64
          key_data = os.environ.get('SIGNING_KEY', '').strip()
          
          try:
              if 'dW5' in key_data:
                  key_data = base64.b64decode(key_data).decode('utf-8')
          except:
              pass
              
          rwr_line = ''
          for line in key_data.split():
              if line.startswith('RWR'):
                  rwr_line = line.strip()
                  break
          
          if not rwr_line and key_data.startswith('RWR'):
              rwr_line = key_data
              
          out_path = os.path.join(os.environ['RUNNER_TEMP'], 'tmurv.key')
          with open(out_path, 'w') as f:
              f.write(rwr_line)
          "

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ runner.temp }}/tmurv.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tmurv v__VERSION__'
          releaseBody: 'Voir les changements dans les commits associés.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
